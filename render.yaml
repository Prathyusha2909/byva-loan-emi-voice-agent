services:
  - type: web
    name: byva-loan-emi-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://byva-loan-emi-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173

  - type: web
    name: byva-loan-emi-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://byva-loan-emi-backend.onrender.com
